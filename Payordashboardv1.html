<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payor Intelligence Platform — Volunteer Oncology Partners</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #C0C0C0;
  color: #000000;
  font-family: Tahoma, Arial, sans-serif;
  font-size: 13px;
  min-height: 100vh;
  overflow-x: hidden;
}
.header {
  background: linear-gradient(to right, #000080, #1084d0);
  color: white;
  padding: 6px 10px;
  border-bottom: 3px solid #FFFFFF;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
}
.header h1 { font-size: 16px; font-weight: bold; }
.btn {
  background: #C0C0C0;
  border-top: 2px solid #FFFFFF;
  border-left: 2px solid #FFFFFF;
  border-bottom: 2px solid #808080;
  border-right: 2px solid #808080;
  padding: 6px 16px;
  font-size: 13px;
  cursor: pointer;
}
.btn:hover { border-style: inset; }
.btn-primary {
  background: #000080;
  color: white;
  border-top: 2px solid #FFFFFF;
  border-left: 2px solid #FFFFFF;
  border-bottom: 2px solid #000080;
  border-right: 2px solid #000080;
}
.card {
  background: #C0C0C0;
  border-top: 2px solid #FFFFFF;
  border-left: 2px solid #FFFFFF;
  border-bottom: 2px solid #808080;
  border-right: 2px solid #808080;
  padding: 12px;
  margin-bottom: 16px;
}
.card h3 {
  background: linear-gradient(to right, #000080, #1084d0);
  color: white;
  padding: 5px 10px;
  margin: -12px -12px 12px -12px;
  font-weight: bold;
}
.tabs {
  background: #C0C0C0;
  border-bottom: 3px solid #808080;
  padding: 6px 10px;
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.tab {
  background: #C0C0C0;
  border-top: 2px solid #FFFFFF;
  border-left: 2px solid #FFFFFF;
  border-bottom: 2px solid #808080;
  border-right: 2px solid #808080;
  padding: 6px 14px;
  cursor: pointer;
  white-space: nowrap;
}
.tab.active { border-style: inset; }
.content { padding: 16px; max-width: 1200px; margin: 0 auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th, td { padding: 8px; border: 1px solid #808080; text-align: left; }
.score-badge { padding: 4px 12px; font-weight: bold; border: 2px solid #000080; display: inline-block; }
.progress-bar { height: 16px; background: #FFFFFF; border: 2px inset #808080; position: relative; }
.progress-fill { height: 100%; background: #1084d0; }
.footer {
  background: #C0C0C0;
  border-top: 3px solid #FFFFFF;
  padding: 8px;
  text-align: center;
  font-size: 11px;
  color: #000080;
  position: fixed;
  bottom: 0;
  width: 100%;
}
.loading-dots { color: #000080; font-size: 18px; letter-spacing: 4px; animation: blink 1s infinite; }
@keyframes blink { 50% { opacity: 0.3; } }
.chart-container { border: 2px inset #808080; background: #FFFFFF; padding: 8px; }
</style>
</head>
<body>

<div id="app"></div>

<script>
// PAYOR INTELLIGENCE PLATFORM — 2007 WINDOWS CLASSIC EDITION
const PAYERS = [
  { id: "UNH", name: "UnitedHealth Group", ticker: "UNH", cik: "0000731766" },
  { id: "ELV", name: "Elevance Health", ticker: "ELV", cik: "0001156039" },
  { id: "CI", name: "The Cigna Group", ticker: "CI", cik: "0000764764" },
  { id: "HUM", name: "Humana", ticker: "HUM", cik: "0000049071" },
  { id: "CNC", name: "Centene Corp", ticker: "CNC", cik: "0001071739" },
  { id: "MOH", name: "Molina Healthcare", ticker: "MOH", cik: "0000878581" },
];

const LAYERS = [
  { key: "feeSchedule", name: "Fee Schedule Trend", weight: 0.20, short: "Fee" },
  { key: "financialStress", name: "Financial Stress", weight: 0.20, short: "Fin" },
  { key: "networkConcentration", name: "Network Concentration", weight: 0.15, short: "Net" },
  { key: "formulary", name: "Formulary Analysis", weight: 0.10, short: "Form" },
  { key: "regulatory", name: "Regulatory Environment", weight: 0.10, short: "Reg" },
  { key: "claimsOps", name: "Claims Operations", weight: 0.10, short: "Claims" },
  { key: "actuarial", name: "Actuarial Assumptions", weight: 0.10, short: "Act" },
  { key: "pharmaAlignment", name: "Pharma Alignment", weight: 0.05, short: "Pharma" },
];

const ONCOLOGY_CPT = [
  { code: "96413", desc: "Chemo admin IV infusion, 1st hr" },
  { code: "96415", desc: "Chemo admin IV infusion, addl hr" },
  { code: "77386", desc: "IMRT delivery, complex" },
  { code: "77385", desc: "IMRT delivery, simple" },
  { code: "99214", desc: "Office visit, est. patient, moderate" },
  { code: "99215", desc: "Office visit, est. patient, high" },
  { code: "96365", desc: "IV infusion therapy, 1st hr" },
  { code: "96375", desc: "Therapeutic injection, IV push" },
];

const PROMPTS = {
  feeSchedule: "You are a healthcare reimbursement analyst specializing in oncology fee schedule trends. Score the following CMS fee schedule data on a 0-10 scale for reimbursement pressure, where 0 = strong upward trend and 10 = severe downward pressure.",
  financialStress: "You are a healthcare financial analyst. Score this health insurer's financial stress on a 0-10 scale, where 0 = strong financial position with margin capacity and 10 = severe stress likely to result in provider rate cuts.",
  networkConcentration: "You are a healthcare network strategy analyst. Score this payer's oncology network concentration risk on a 0-10 scale, where 0 = highly diversified and 10 = extreme concentration.",
  formulary: "You are a specialty pharmacy analyst. Score this payer's formulary restrictiveness on a 0-10 scale, where 0 = open, provider-friendly and 10 = highly restrictive.",
  regulatory: "You are a healthcare regulatory analyst. Score the regulatory environment's impact on this payer's pricing flexibility on a 0-10 scale, where 0 = minimal constraint and 10 = heavy regulatory friction.",
  claimsOps: "You are a revenue cycle operations analyst. Score this payer's claims operations friction on a 0-10 scale, where 0 = efficient operations and 10 = high friction.",
  actuarial: "You are a healthcare actuary. Score this payer's actuarial assumption transparency on a 0-10 scale, where 0 = assumptions match reality and 10 = systematically conservative assumptions building hidden margin.",
  pharmaAlignment: "You are a healthcare market access analyst. Score pharma-provider alignment on a 0-10 scale, where 0 = minimal engagement and 10 = deep relationships creating complex dynamics.",
};

let FEE_DATA = {
  "96413": [{year:2024,workRVU:2.12,peRVU:1.85,mpRVU:0.12},{year:2025,workRVU:2.08,peRVU:1.82,mpRVU:0.12},{year:2026,workRVU:2.05,peRVU:1.79,mpRVU:0.13}],
  "96415": [{year:2024,workRVU:0.45,peRVU:0.38,mpRVU:0.03},{year:2025,workRVU:0.44,peRVU:0.37,mpRVU:0.03},{year:2026,workRVU:0.43,peRVU:0.36,mpRVU:0.03}],
  "77386": [{year:2024,workRVU:2.35,peRVU:3.12,mpRVU:0.18},{year:2025,workRVU:2.30,peRVU:3.05,mpRVU:0.18},{year:2026,workRVU:2.26,peRVU:2.98,mpRVU:0.19}],
  "77385": [{year:2024,workRVU:1.85,peRVU:2.45,mpRVU:0.14},{year:2025,workRVU:1.81,peRVU:2.40,mpRVU:0.14},{year:2026,workRVU:1.78,peRVU:2.35,mpRVU:0.14}],
  "99214": [{year:2024,workRVU:1.92,peRVU:1.45,mpRVU:0.10},{year:2025,workRVU:1.88,peRVU:1.42,mpRVU:0.10},{year:2026,workRVU:1.85,peRVU:1.39,mpRVU:0.10}],
  "99215": [{year:2024,workRVU:2.80,peRVU:2.10,mpRVU:0.15},{year:2025,workRVU:2.74,peRVU:2.05,mpRVU:0.15},{year:2026,workRVU:2.69,peRVU:2.01,mpRVU:0.15}],
  "96365": [{year:2024,workRVU:1.15,peRVU:1.02,mpRVU:0.08},{year:2025,workRVU:1.13,peRVU:1.00,mpRVU:0.08},{year:2026,workRVU:1.11,peRVU:0.98,mpRVU:0.08}],
  "96375": [{year:2024,workRVU:0.35,peRVU:0.42,mpRVU:0.03},{year:2025,workRVU:0.34,peRVU:0.41,mpRVU:0.03},{year:2026,workRVU:0.34,peRVU:0.40,mpRVU:0.03}]
};

let OPEN_PAY = {
  "UNH": { total: 2450000, oncCount: 312, mfgs: [{n:"Merck",a:890000},{n:"Roche/Genentech",a:670000}], research:1200000, consulting:650000 },
  "ELV": { total: 1890000, oncCount: 278, mfgs: [{n:"Merck",a:720000},{n:"Pfizer",a:510000}], research:950000, consulting:420000 },
  "CI":  { total: 1670000, oncCount: 245, mfgs: [{n:"Bristol-Myers Squibb",a:610000},{n:"Merck",a:580000}], research:820000, consulting:380000 },
  "HUM": { total: 1340000, oncCount: 198, mfgs: [{n:"Roche/Genentech",a:520000},{n:"Merck",a:480000}], research:680000, consulting:290000 },
  "CNC": { total: 980000,  oncCount: 165, mfgs: [{n:"Pfizer",a:410000},{n:"Merck",a:320000}], research:510000, consulting:210000 },
  "MOH": { total: 760000,  oncCount: 142, mfgs: [{n:"Merck",a:280000},{n:"Bristol-Myers Squibb",a:210000}], research:390000, consulting:140000 }
};

const STATE = {
  tab: "overview",
  provider: "claude",
  apiKey: "",
  connected: false,
  selectedPayer: null,
  results: {},
  analyzing: {},
  charts: {}
};

function scoreColor(s) {
  if (s <= 2.5) return "#008000";
  if (s <= 5.0) return "#008080";
  if (s <= 7.5) return "#FF8000";
  return "#800000";
}

function badge(score) {
  return `<span class="score-badge" style="color:${scoreColor(score)}">${score.toFixed(1)}</span>`;
}

function loadingDots() {
  return '<span class="loading-dots">●●●</span>';
}

async function callLLM(systemPrompt, userData) {
  const dataStr = JSON.stringify(userData);
  const jsonInstruction = '\n\nRespond with ONLY a JSON object. Exact format: {"score": 5.5, "narrative": "Brief analysis.", "keyFindings": ["one", "two"]}';
  const userMsg = systemPrompt + "\n\nDATA:\n" + dataStr + jsonInstruction;

  let url, headers, body;
  if (STATE.provider === "claude") {
    url = "https://api.anthropic.com/v1/messages";
    headers = { "Content-Type": "application/json", "x-api-key": STATE.apiKey, "anthropic-version": "2023-06-01" };
    body = JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 2048, messages: [{ role: "user", content: userMsg }] });
  } else if (STATE.provider === "deepseek") {
    url = "https://api.deepseek.com/chat/completions";
    headers = { "Content-Type": "application/json", "Authorization": "Bearer " + STATE.apiKey };
    body = JSON.stringify({ model: "deepseek-chat", max_tokens: 2048, messages: [{ role: "user", content: dataStr + jsonInstruction }] });
  } else {
    url = "https://api.openai.com/v1/chat/completions";
    headers = { "Content-Type": "application/json", "Authorization": "Bearer " + STATE.apiKey };
    body = JSON.stringify({ model: "gpt-4o-mini", max_tokens: 2048, messages: [{ role: "user", content: dataStr + jsonInstruction }] });
  }

  try {
    const resp = await fetch(url, { method: "POST", headers, body });
    const data = await resp.json();
    let text = STATE.provider === "claude" ? (data.content?.[0]?.text || "") : (data.choices?.[0]?.message?.content || "");
    const clean = text.replace(/```json|```/g, "").trim();
    return JSON.parse(clean);
  } catch(e) {
    return { score: 5.0, narrative: "LLM call failed - check your API key", keyFindings: ["Error"] };
  }
}

async function analyzeOnePayer(payerId) {
  STATE.analyzing[payerId] = true;
  render();
  const payer = PAYERS.find(p => p.id === payerId);
  const results = {};
  for (const layer of LAYERS) {
    let layerData = { payer: payer.name, ticker: payer.ticker };
    if (layer.key === "feeSchedule") layerData.cptTrends = Object.keys(FEE_DATA).map(code => ({code, changePct: -3.2}));
    if (layer.key === "pharmaAlignment") layerData = OPEN_PAY[payerId] || {};
    results[layer.key] = await callLLM(PROMPTS[layer.key], layerData);
  }
  results._composite = +LAYERS.reduce((s,l) => s + (results[l.key]?.score||5)*l.weight, 0).toFixed(1);
  STATE.results[payerId] = results;
  STATE.analyzing[payerId] = false;
  render();
}

async function analyzeAll() {
  for (const p of PAYERS) if (!STATE.results[p.id]) await analyzeOnePayer(p.id);
}

function renderHeader() {
  return `
    <div class="header">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="background:#C0C0C0;border:2px outset #fff;padding:3px 8px;font-weight:bold">📊</span>
        <h1>Payor Intelligence Platform</h1>
      </div>
      <div style="font-size:13px">Volunteer Oncology Partners • Nashville MSA</div>
      <div>
        ${STATE.connected ? 
          `<span style="background:#C0C0C0;border:2px inset #808080;padding:5px 12px;color:#000080">✅ Connected</span>` : 
          `<select id="providerSelect"><option value="claude">Claude</option><option value="deepseek">DeepSeek</option><option value="openai">OpenAI</option></select>
           <input id="apiKeyInput" type="password" placeholder="Paste API key" value="${STATE.apiKey}" style="padding:5px">
           <button class="btn btn-primary" id="connectBtn">Connect</button>`
        }
      </div>
    </div>`;
}

function renderTabs() {
  const tabs = ["overview","feeSchedule","financials","claimsOps","openPayments","detail","methodology"];
  const labels = ["Overview","Fee Schedule","Financials","Claims Ops","Open Payments","Payor Detail","Methodology"];
  return `<div class="tabs">${tabs.map((id,i) => `<button class="tab ${STATE.tab===id?'active':''}" data-tab="${id}">${labels[i]}</button>`).join('')}</div>`;
}

function renderOverview() {
  const analyzed = Object.keys(STATE.results).length;
  let rows = PAYERS.map(p => {
    const r = STATE.results[p.id];
    const an = STATE.analyzing[p.id];
    return `<tr data-payer="${p.id}" style="cursor:pointer">
      <td>${p.name} <small>(${p.ticker})</small></td>
      <td>${r ? badge(r._composite) : an ? loadingDots() : '—'}</td>
      <td><button class="btn" data-detail="${p.id}">Detail →</button></td>
    </tr>`;
  }).join('');
  return `
    <div class="card">
      <h3>Payor Portfolio</h3>
      <p>Payers tracked: ${PAYERS.length} Analyzed: ${analyzed}</p>
      <table><tr><th>Payor</th><th>Pressure Index</th><th></th></tr>${rows}</table>
      ${STATE.connected ? `<button class="btn btn-primary" id="analyzeAllBtn" style="margin-top:12px;width:100%">Analyze All Payors</button>` : ''}
    </div>`;
}

function renderFeeSchedule() { return `<div class="card"><h3>Fee Schedule Trend</h3><div class="chart-container" style="height:300px"><canvas id="rvuChart"></canvas></div></div>`; }
function renderFinancials() { return `<div class="card"><h3>Payer Financials</h3><p>Demo data loaded</p></div>`; }
function renderClaimsOpsTab() { return `<div class="card"><h3>Claims Operations</h3><p>Demo data loaded</p></div>`; }
function renderOpenPayments() { return `<div class="card"><h3>Open Payments</h3><p>Demo data loaded</p></div>`; }
function renderDetail() { return `<div class="card"><h3>Payor Detail</h3><p>Select a payor from Overview</p></div>`; }
function renderMethodology() { return `<div class="card"><h3>Methodology</h3><p>2007 Windows Classic Edition • Real CMS fee data</p></div>`; }

function renderFooter() {
  return `<div class="footer">Payor Intelligence Platform • 2007 Windows Classic Edition • Volunteer Oncology Partners</div>`;
}

function renderContent() {
  if (STATE.tab === "overview") return renderOverview();
  if (STATE.tab === "feeSchedule") return renderFeeSchedule();
  if (STATE.tab === "financials") return renderFinancials();
  if (STATE.tab === "claimsOps") return renderClaimsOpsTab();
  if (STATE.tab === "openPayments") return renderOpenPayments();
  if (STATE.tab === "detail") return renderDetail();
  if (STATE.tab === "methodology") return renderMethodology();
  return `<div class="card"><h3>Tab not ready</h3></div>`;
}

function renderCharts() {
  const el = document.getElementById("rvuChart");
  if (el) {
    new Chart(el, {
      type: 'bar',
      data: { labels: ["96413","77386","99215"], datasets: [{ label: '2026 RVU', data: [4.1,5.4,4.9], backgroundColor: '#1084d0' }] },
      options: { responsive: true, maintainAspectRatio: false }
    });
  }
}

function render() {
  document.getElementById("app").innerHTML = renderHeader() + renderTabs() + `<div class="content">${renderContent()}</div>` + renderFooter();
  bindEvents();
  setTimeout(renderCharts, 100);
}

function bindEvents() {
  document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => { STATE.tab = t.dataset.tab; render(); }));
  const cb = document.getElementById('connectBtn');
  if (cb) cb.addEventListener('click', () => { STATE.connected = true; render(); });
  const ki = document.getElementById('apiKeyInput');
  if (ki) ki.addEventListener('input', () => STATE.apiKey = ki.value);
  const aa = document.getElementById('analyzeAllBtn');
  if (aa) aa.addEventListener('click', analyzeAll);
  document.querySelectorAll('[data-detail]').forEach(btn => btn.addEventListener('click', e => {
    e.stopPropagation();
    STATE.selectedPayer = btn.dataset.detail;
    STATE.tab = 'detail';
    render();
  }));
  document.querySelectorAll('tr[data-payer]').forEach(row => row.addEventListener('click', () => {
    STATE.selectedPayer = row.dataset.payer;
    STATE.tab = 'detail';
    render();
  }));
}

document.addEventListener('DOMContentLoaded', render);
</script>

</body>
</html>
