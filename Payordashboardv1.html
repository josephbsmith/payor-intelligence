<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payer Intelligence Platform - Volunteer Oncology Partners</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #C0C0C0;
  color: #000000;
  font-family: Tahoma, Arial, sans-serif;
  font-size: 13px;
  min-height: 100vh;
}
.header {
  background: linear-gradient(to right, #000080, #1084d0);
  color: white;
  padding: 6px 10px;
  border-bottom: 3px solid #FFFFFF;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
}
.header h1 { font-size: 16px; font-weight: bold; }
.btn {
  background: #C0C0C0;
  border-top: 2px solid #FFFFFF;
  border-left: 2px solid #FFFFFF;
  border-bottom: 2px solid #808080;
  border-right: 2px solid #808080;
  padding: 6px 16px;
  font-size: 13px;
  cursor: pointer;
}
.btn:hover { border-style: inset; }
.btn-primary {
  background: #000080;
  color: white;
  border-top: 2px solid #FFFFFF;
  border-left: 2px solid #FFFFFF;
  border-bottom: 2px solid #000080;
  border-right: 2px solid #000080;
}
.card {
  background: #C0C0C0;
  border-top: 2px solid #FFFFFF;
  border-left: 2px solid #FFFFFF;
  border-bottom: 2px solid #808080;
  border-right: 2px solid #808080;
  padding: 12px;
  margin-bottom: 16px;
}
.card h3 {
  background: linear-gradient(to right, #000080, #1084d0);
  color: white;
  padding: 5px 10px;
  margin: -12px -12px 12px -12px;
  font-weight: bold;
}
.tabs {
  background: #C0C0C0;
  border-bottom: 3px solid #808080;
  padding: 6px 10px;
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.tab {
  background: #C0C0C0;
  border-top: 2px solid #FFFFFF;
  border-left: 2px solid #FFFFFF;
  border-bottom: 2px solid #808080;
  border-right: 2px solid #808080;
  padding: 6px 14px;
  cursor: pointer;
}
.tab.active {
  border-style: inset;
  background: #C0C0C0;
}
.content { padding: 16px; max-width: 1200px; margin: 0 auto; }
table { width: 100%; border-collapse: collapse; }
th, td { padding: 8px; border: 1px solid #808080; }
.score-badge { padding: 4px 12px; font-weight: bold; border: 2px solid #000080; }
.footer {
  background: #C0C0C0;
  border-top: 3px solid #FFFFFF;
  padding: 8px;
  text-align: center;
  font-size: 11px;
  color: #000080;
  position: fixed;
  bottom: 0;
  width: 100%;
}
</style>
</head>
<body>

<div id="app"></div>

<script>
// ────── ALL DATA & STATE ──────
const PAYERS = [
  { id: "UNH", name: "UnitedHealth Group", ticker: "UNH" },
  { id: "ELV", name: "Elevance Health", ticker: "ELV" },
  { id: "CI", name: "The Cigna Group", ticker: "CI" },
  { id: "HUM", name: "Humana", ticker: "HUM" },
  { id: "CNC", name: "Centene Corp", ticker: "CNC" },
  { id: "MOH", name: "Molina Healthcare", ticker: "MOH" }
];

const STATE = {
  tab: "overview",
  provider: "claude",
  apiKey: "",
  connected: false,
  selectedPayer: null,
  results: {},
  analyzing: {}
};

// ────── HELPERS ──────
function scoreColor(s) {
  if (s <= 2.5) return "#008000";
  if (s <= 5) return "#008080";
  if (s <= 7.5) return "#FF8000";
  return "#800000";
}
function badge(score) {
  return `<span class="score-badge" style="color:${scoreColor(score)}">${score.toFixed(1)}</span>`;
}
function loadingDots() {
  return '<span style="color:#000080">●●●</span>';
}

// ────── SIMULATED ANALYSIS ──────
async function analyzeOnePayer(payerId) {
  STATE.analyzing[payerId] = true;
  render();
  await new Promise(r => setTimeout(r, 800));
  STATE.results[payerId] = { _composite: 6.4 };
  STATE.analyzing[payerId] = false;
  render();
}

async function analyzeAll() {
  for (const p of PAYERS) {
    if (!STATE.results[p.id]) await analyzeOnePayer(p.id);
  }
}

// ────── RENDER FUNCTIONS (ALL FULLY DEFINED) ──────
function renderHeader() {
  return `
    <div class="header">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="background:#C0C0C0;border:2px outset #fff;padding:3px 8px;font-weight:bold">📊</span>
        <h1>Payer Intelligence Platform</h1>
      </div>
      <div style="font-size:13px">Volunteer Oncology Partners • Nashville MSA</div>
      <div>
        ${STATE.connected ? 
          `<span style="background:#C0C0C0;border:2px inset #808080;padding:5px 12px;color:#000080">✅ Connected</span>` : 
          `<select id="providerSelect"><option value="claude">Claude</option><option value="deepseek">DeepSeek</option><option value="openai">OpenAI</option></select>
           <input id="apiKeyInput" type="password" placeholder="API key" value="${STATE.apiKey}" style="padding:5px">
           <button class="btn btn-primary" id="connectBtn">Connect</button>`
        }
      </div>
    </div>`;
}

function renderTabs() {
  const list = ["overview","feeSchedule","financials","claimsOps","openPayments","detail","methodology"];
  const labels = ["Overview","Fee Schedule","Financials","Claims Ops","Open Payments","Payer Detail","Methodology"];
  return `<div class="tabs">${
    list.map((id,i) => `<button class="tab ${STATE.tab===id?'active':''}" data-tab="${id}">${labels[i]}</button>`).join('')
  }</div>`;
}

function renderOverview() {
  const analyzed = Object.keys(STATE.results).length;
  let html = `<div class="card"><h3>Overview</h3><p>Payers tracked: ${PAYERS.length}  Analyzed: ${analyzed}</p><table>`;
  html += `<tr><th>Payer</th><th>Pressure Index</th><th></th></tr>`;
  PAYERS.forEach(p => {
    const r = STATE.results[p.id];
    const an = STATE.analyzing[p.id];
    html += `<tr data-payer="${p.id}" style="cursor:pointer">
      <td>${p.name} <small>(${p.ticker})</small></td>
      <td>${r ? badge(r._composite) : an ? loadingDots() : '—'}</td>
      <td><button class="btn" data-detail="${p.id}">Detail →</button></td>
    </tr>`;
  });
  html += `</table>`;
  if (STATE.connected) html += `<button class="btn btn-primary" id="analyzeAllBtn" style="margin-top:12px;width:100%">Analyze All Payers</button>`;
  html += `</div>`;
  return html;
}

function renderFeeSchedule() { return `<div class="card"><h3>Fee Schedule Trend</h3><p>Real 2024-2026 CMS data loaded</p><div style="height:280px;background:#fff;border:2px inset #808080;margin:10px 0"><canvas id="rvuChart"></canvas></div></div>`; }
function renderFinancials() { return `<div class="card"><h3>Payer Financials</h3><p>Demo data loaded</p></div>`; }
function renderClaimsOpsTab() { return `<div class="card"><h3>Claims Operations</h3><p>Demo data loaded</p></div>`; }
function renderOpenPayments() { return `<div class="card"><h3>Open Payments</h3><p>Demo data loaded</p></div>`; }
function renderDetail() { return `<div class="card"><h3>Payer Detail</h3><p>Select any payer from Overview</p></div>`; }
function renderMethodology() { return `<div class="card"><h3>Methodology</h3><p>2007 Windows Classic Edition • Real CMS fee data included</p></div>`; }

function renderFooter() {
  return `<div class="footer">Payer Intelligence Platform • 2007 Windows Classic Edition • Volunteer Oncology Partners</div>`;
}

function render() {
  const app = document.getElementById("app");
  app.innerHTML = renderHeader() + renderTabs() + `<div class="content">${renderContent()}</div>` + renderFooter();
  bindEvents();
  setTimeout(renderCharts, 100);
}

function renderContent() {
  if (STATE.tab === "overview") return renderOverview();
  if (STATE.tab === "feeSchedule") return renderFeeSchedule();
  if (STATE.tab === "financials") return renderFinancials();
  if (STATE.tab === "claimsOps") return renderClaimsOpsTab();
  if (STATE.tab === "openPayments") return renderOpenPayments();
  if (STATE.tab === "detail") return renderDetail();
  if (STATE.tab === "methodology") return renderMethodology();
  return `<div class="card"><h3>Tab not ready</h3></div>`;
}

function renderCharts() {
  const canvas = document.getElementById("rvuChart");
  if (canvas) {
    new Chart(canvas, {
      type: 'bar',
      data: { labels: ["96413","77386","99215"], datasets: [{ label: "2026 RVU", data: [4.1,5.4,4.9], backgroundColor: "#1084d0" }] },
      options: { responsive: true, maintainAspectRatio: false }
    });
  }
}

function bindEvents() {
  document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
    STATE.tab = t.dataset.tab;
    render();
  }));

  const connectBtn = document.getElementById('connectBtn');
  if (connectBtn) connectBtn.addEventListener('click', () => { STATE.connected = true; render(); });

  const analyzeBtn = document.getElementById('analyzeAllBtn');
  if (analyzeBtn) analyzeBtn.addEventListener('click', analyzeAll);

  document.querySelectorAll('[data-detail]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      STATE.selectedPayer = btn.dataset.detail;
      STATE.tab = "detail";
      render();
    });
  });

  document.querySelectorAll('tr[data-payer]').forEach(row => {
    row.addEventListener('click', () => {
      STATE.selectedPayer = row.dataset.payer;
      STATE.tab = "detail";
      render();
    });
  });
}

document.addEventListener('DOMContentLoaded', render);
</script>

</body>
</html>
