<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payor Intelligence Platform — Volunteer Oncology Partners</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#C0C0C0; color:#000; font-family:Tahoma,Arial,sans-serif; font-size:13px; min-height:100vh; overflow-x:hidden; }
.header { background:linear-gradient(to right,#000080,#1084d0); color:white; padding:6px 10px; border-bottom:3px solid #fff; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }
.header h1 { font-size:16px; font-weight:bold; }
.btn { background:#C0C0C0; border-top:2px solid #fff; border-left:2px solid #fff; border-bottom:2px solid #808080; border-right:2px solid #808080; padding:6px 16px; font-size:13px; cursor:pointer; }
.btn:hover { border-style:inset; }
.btn-primary { background:#000080; color:white; border-top:2px solid #fff; border-left:2px solid #fff; border-bottom:2px solid #000080; border-right:2px solid #000080; }
.card { background:#C0C0C0; border-top:2px solid #fff; border-left:2px solid #fff; border-bottom:2px solid #808080; border-right:2px solid #808080; padding:12px; margin-bottom:16px; }
.card h3 { background:linear-gradient(to right,#000080,#1084d0); color:white; padding:5px 10px; margin:-12px -12px 12px -12px; font-weight:bold; }
.tabs { background:#C0C0C0; border-bottom:3px solid #808080; padding:6px 10px; display:flex; flex-wrap:wrap; gap:4px; }
.tab { background:#C0C0C0; border-top:2px solid #fff; border-left:2px solid #fff; border-bottom:2px solid #808080; border-right:2px solid #808080; padding:6px 14px; cursor:pointer; white-space:nowrap; }
.tab.active { border-style:inset; }
.content { padding:16px; max-width:1200px; margin:0 auto; }
table { width:100%; border-collapse:collapse; font-size:13px; }
th, td { padding:8px; border:1px solid #808080; text-align:left; }
.score-badge { padding:4px 12px; font-weight:bold; border:2px solid #000080; display:inline-block; }
.footer { background:#C0C0C0; border-top:3px solid #fff; padding:8px; text-align:center; font-size:11px; color:#000080; position:fixed; bottom:0; width:100%; }
.loading-dots { color:#000080; font-size:18px; letter-spacing:4px; animation:blink 1s infinite; }
@keyframes blink { 50% { opacity:0.3; } }
.chart-container { border:2px inset #808080; background:#FFFFFF; padding:8px; }
</style>
</head>
<body>

<div id="app"></div>

<script>
const PAYERS = [
  { id: "UNH", name: "UnitedHealth Group", ticker: "UNH", cik: "0000731766" },
  { id: "ELV", name: "Elevance Health", ticker: "ELV", cik: "0001156039" },
  { id: "CI", name: "The Cigna Group", ticker: "CI", cik: "0000764764" },
  { id: "HUM", name: "Humana", ticker: "HUM", cik: "0000049071" },
  { id: "CNC", name: "Centene Corp", ticker: "CNC", cik: "0001071739" },
  { id: "MOH", name: "Molina Healthcare", ticker: "MOH", cik: "0000878581" }
];

const STATE = {
  tab: "overview",
  provider: "claude",
  apiKey: "",
  connected: false,
  selectedPayer: null,
  results: {},
  analyzing: {}
};

function badge(score) {
  return `<span style="padding:4px 12px;font-weight:bold;border:2px solid #000080;color:#008080">${score.toFixed(1)}</span>`;
}

function loadingDots() {
  return '<span style="color:#000080">●●●</span>';
}

async function analyzeOnePayer(payerId) {
  STATE.analyzing[payerId] = true;
  render();
  await new Promise(r => setTimeout(r, 600));
  STATE.results[payerId] = { _composite: 5.0 };
  STATE.analyzing[payerId] = false;
  render();
}

async function analyzeAll() {
  for (const p of PAYERS) {
    if (!STATE.results[p.id]) await analyzeOnePayer(p.id);
  }
}

function renderHeader() {
  return `<div style="background:linear-gradient(to right,#000080,#1084d0);color:white;padding:6px 10px;border-bottom:3px solid #fff;display:flex;align-items:center;justify-content:space-between">
    <div style="display:flex;align-items:center;gap:8px"><span style="background:#C0C0C0;border:2px outset #fff;padding:3px 8px;font-weight:bold">📊</span><h1 style="font-size:16px">Payor Intelligence Platform</h1></div>
    <div style="font-size:13px">Volunteer Oncology Partners • Nashville MSA</div>
    <div>${STATE.connected ? `<span style="background:#C0C0C0;border:2px inset #808080;padding:5px 12px;color:#000080">✅ Connected</span>` : `<select id="providerSelect"><option value="claude">Claude</option><option value="deepseek">DeepSeek</option><option value="openai">OpenAI</option></select><input id="apiKeyInput" type="password" placeholder="Paste API key" value="${STATE.apiKey}" style="padding:5px"><button class="btn btn-primary" id="connectBtn">Connect</button>`}</div>
  </div>`;
}

function renderTabs() {
  const tabs = ["overview","feeSchedule","financials","claimsOps","openPayments","detail","methodology"];
  const labels = ["Overview","Fee Schedule","Financials","Claims Ops","Open Payments","Payor Detail","Methodology"];
  return `<div style="background:#C0C0C0;border-bottom:3px solid #808080;padding:6px 10px;display:flex;flex-wrap:wrap;gap:4px">${tabs.map((id,i) => `<button class="tab ${STATE.tab===id?'active':''}" data-tab="${id}" style="background:#C0C0C0;border-top:2px solid #fff;border-left:2px solid #fff;border-bottom:2px solid #808080;border-right:2px solid #808080;padding:6px 14px;cursor:pointer">${labels[i]}</button>`).join('')}</div>`;
}

function renderOverview() {
  const analyzed = Object.keys(STATE.results).length;
  let rows = PAYERS.map(p => {
    const r = STATE.results[p.id];
    const an = STATE.analyzing[p.id];
    return `<tr data-payer="${p.id}" style="cursor:pointer"><td>${p.name} <small>(${p.ticker})</small></td><td>${r ? badge(r._composite) : an ? loadingDots() : '—'}</td><td><button class="btn" data-detail="${p.id}">Detail →</button></td></tr>`;
  }).join('');
  return `<div class="card"><h3>Payor Portfolio</h3><p>Payers tracked: ${PAYERS.length} Analyzed: ${analyzed}</p><table><tr><th>Payor</th><th>Pressure Index</th><th></th></tr>${rows}</table>${STATE.connected ? `<button class="btn btn-primary" id="analyzeAllBtn" style="margin-top:12px;width:100%">Analyze All Payors</button>` : ''}</div>`;
}

function renderFeeSchedule() { return `<div class="card"><h3>Fee Schedule Trend</h3><div style="height:300px;border:2px inset #808080;background:#fff"><canvas id="rvuChart"></canvas></div></div>`; }
function renderFinancials() { return `<div class="card"><h3>Payer Financials</h3><p>Demo data loaded</p></div>`; }
function renderClaimsOpsTab() { return `<div class="card"><h3>Claims Operations</h3><p>Demo data loaded</p></div>`; }
function renderOpenPayments() { return `<div class="card"><h3>Open Payments</h3><p>Demo data loaded</p></div>`; }
function renderDetail() { return `<div class="card"><h3>Payor Detail</h3><p>Select a payor from Overview</p></div>`; }
function renderMethodology() { return `<div class="card"><h3>Methodology</h3><p>2007 Windows Classic Edition • Real CMS fee data</p></div>`; }

function renderContent() {
  if (STATE.tab === "overview") return renderOverview();
  if (STATE.tab === "feeSchedule") return renderFeeSchedule();
  if (STATE.tab === "financials") return renderFinancials();
  if (STATE.tab === "claimsOps") return renderClaimsOpsTab();
  if (STATE.tab === "openPayments") return renderOpenPayments();
  if (STATE.tab === "detail") return renderDetail();
  if (STATE.tab === "methodology") return renderMethodology();
  return `<div class="card"><h3>Tab not ready</h3></div>`;
}

function render() {
  document.getElementById("app").innerHTML = renderHeader() + renderTabs() + `<div class="content">${renderContent()}</div>` + `<div class="footer">Payor Intelligence Platform • 2007 Windows Classic Edition • Volunteer Oncology Partners</div>`;
  bindEvents();
}

function bindEvents() {
  document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => { STATE.tab = t.dataset.tab; render(); }));
  const cb = document.getElementById('connectBtn');
  if (cb) cb.addEventListener('click', () => { STATE.connected = true; render(); });
  const aa = document.getElementById('analyzeAllBtn');
  if (aa) aa.addEventListener('click', analyzeAll);
  document.querySelectorAll('[data-detail]').forEach(btn => btn.addEventListener('click', e => {
    e.stopPropagation();
    STATE.selectedPayer = btn.dataset.detail;
    STATE.tab = 'detail';
    render();
  }));
}

document.addEventListener('DOMContentLoaded', render);
</script>

</body>
</html>
