<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payer Intelligence Platform — Volunteer Oncology Partners</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0a0f1a;
  --surface: #111827;
  --surface-alt: #1a2235;
  --border: #1e2d45;
  --border-light: #2a3f5f;
  --text: #e2e8f0;
  --text-muted: #8892a4;
  --text-dim: #5a6478;
  --accent: #3b82f6;
  --accent-glow: rgba(59,130,246,0.15);
  --green: #10b981;
  --green-dim: rgba(16,185,129,0.15);
  --amber: #f59e0b;
  --amber-dim: rgba(245,158,11,0.15);
  --red: #ef4444;
  --red-dim: rgba(239,68,68,0.15);
  --cyan: #06b6d4;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', 'Segoe UI', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

.mono { font-family: 'JetBrains Mono', 'Fira Code', monospace; }

/* Header */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
}
.header-left { display: flex; align-items: center; gap: 16px; }
.header-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 12px var(--accent);
}
.header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
.header .subtitle { font-size: 11px; color: var(--text-muted); }
.api-controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.api-controls select, .api-controls input {
  background: var(--surface-alt); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 14px; color: var(--text);
  font-size: 13px; outline: none; font-family: inherit;
}
.api-controls select { width: 140px; cursor: pointer; }
.api-controls input { width: 260px; }
.btn {
  border: none; border-radius: 8px; padding: 8px 18px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  font-family: inherit; transition: all 0.2s;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { filter: brightness(1.15); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-outline {
  background: transparent; color: var(--text-muted);
  border: 1px solid var(--border);
}
.btn-outline:hover { border-color: var(--accent); color: var(--text); }
.connected-badge {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; color: var(--green);
}
.connected-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--green);
}

/* Tabs */
.tabs {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  display: flex; gap: 0;
  overflow-x: auto;
}
.tab {
  background: transparent; border: none;
  border-bottom: 2px solid transparent;
  padding: 12px 20px;
  color: var(--text-muted);
  font-size: 13px; font-weight: 400;
  cursor: pointer; white-space: nowrap;
  font-family: inherit; transition: all 0.2s;
}
.tab.active { color: var(--text); font-weight: 600; border-bottom-color: var(--accent); }
.tab:hover:not(.active) { color: var(--text); }

/* Content */
.content { padding: 24px 32px; max-width: 1200px; margin: 0 auto; }

/* Cards */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 16px;
}
.card-clickable { cursor: pointer; transition: border-color 0.2s; }
.card-clickable:hover { border-color: var(--accent); }
.card h3 { font-size: 16px; margin-bottom: 4px; }
.card .desc { color: var(--text-muted); font-size: 13px; margin-bottom: 16px; }

/* Grid */
.grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 16px; }
.grid-2 { display: grid; grid-template-columns: repeat(2,1fr); gap: 16px; margin-bottom: 16px; }
.grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 16px; }

@media (max-width: 900px) {
  .grid-4 { grid-template-columns: repeat(2,1fr); }
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
  .header { padding: 12px 16px; }
  .content { padding: 16px; }
  .tabs { padding: 0 16px; }
}

/* Stat card */
.stat-label {
  color: var(--text-muted); font-size: 11px;
  text-transform: uppercase; letter-spacing: 1px;
  margin-bottom: 8px; font-family: 'JetBrains Mono', monospace;
}
.stat-value { font-size: 32px; font-weight: 700; }

/* Tables */
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th {
  text-align: left; padding: 10px 12px;
  border-bottom: 2px solid var(--border);
  color: var(--text-muted); font-weight: 600;
  font-size: 11px; text-transform: uppercase;
  letter-spacing: 0.5px;
  font-family: 'JetBrains Mono', monospace;
}
td {
  padding: 10px 12px;
  border-bottom: 1px solid rgba(30,45,69,0.3);
}
tr.clickable { cursor: pointer; transition: background 0.15s; }
tr.clickable:hover { background: var(--surface-alt); }
.text-right { text-align: right; }
.text-center { text-align: center; }

/* Score badge */
.score-badge {
  display: inline-flex; align-items: center;
  border-radius: 8px; font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
}
.score-sm { padding: 2px 8px; font-size: 13px; }
.score-md { padding: 4px 12px; font-size: 16px; }
.score-lg { padding: 8px 16px; font-size: 28px; }

/* Progress bars */
.progress-bar {
  height: 8px; background: var(--surface-alt);
  border-radius: 4px; overflow: hidden;
}
.progress-fill {
  height: 100%; border-radius: 4px;
  transition: width 0.8s ease;
}

/* Classification banner */
.classification-banner {
  border-radius: 12px; padding: 16px 24px;
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 16px;
}

/* Layer detail card */
.layer-detail {
  padding: 16px; background: var(--surface-alt);
  border-radius: 10px; margin-bottom: 12px;
  border-left: 3px solid var(--accent);
}
.layer-detail .findings {
  display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px;
}
.finding-tag {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 6px; padding: 3px 10px;
  font-size: 11px; color: var(--text-muted);
}

/* Chart containers */
.chart-container { position: relative; width: 100%; }

/* Loading */
.loading-dots { display: inline-flex; gap: 4px; align-items: center; }
.loading-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent);
  animation: ldpulse 1.2s ease-in-out infinite;
}
.loading-dot:nth-child(2) { animation-delay: 0.2s; }
.loading-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes ldpulse {
  0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1.2); }
}

/* Manufacturer cards */
.mfg-card {
  flex: 1; background: var(--surface-alt);
  border-radius: 8px; padding: 12px; text-align: center;
}
.mfg-name { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
.mfg-amount { font-size: 15px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }

/* Footer */
.footer {
  padding: 24px 32px; text-align: center;
  border-top: 1px solid var(--border); margin-top: 40px;
}
.footer p { color: var(--text-dim); font-size: 11px; }

/* Empty state */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 14px; }

/* Methodology section */
.method-grid { display: grid; grid-template-columns: 160px 1fr; gap: 0; font-size: 13px; }
.method-label {
  padding: 10px 12px; background: rgba(59,130,246,0.08);
  font-weight: 600; color: var(--text);
}
.method-value { padding: 10px 12px; color: var(--text-muted); border-bottom: 1px solid var(--border); }

.weight-table td:first-child { font-weight: 600; }
</style>
</head>
<body>

<div id="app"></div>

<script>
// ═══════════════════════════════════════════════
// DATA LAYER
// ═══════════════════════════════════════════════

const PAYERS = [
  { id: "UNH", name: "UnitedHealth Group", ticker: "UNH", cik: "0000731766" },
  { id: "ELV", name: "Elevance Health", ticker: "ELV", cik: "0001156039" },
  { id: "CI", name: "The Cigna Group", ticker: "CI", cik: "0000764764" },
  { id: "HUM", name: "Humana", ticker: "HUM", cik: "0000049071" },
  { id: "CNC", name: "Centene Corp", ticker: "CNC", cik: "0001071739" },
  { id: "MOH", name: "Molina Healthcare", ticker: "MOH", cik: "0000878581" },
];

const LAYERS = [
  { key: "feeSchedule", name: "Fee Schedule Trend", weight: 0.20, short: "Fee Sched." },
  { key: "financialStress", name: "Financial Stress", weight: 0.20, short: "Fin. Stress" },
  { key: "networkConcentration", name: "Network Concentration", weight: 0.15, short: "Network" },
  { key: "formulary", name: "Formulary Analysis", weight: 0.10, short: "Formulary" },
  { key: "regulatory", name: "Regulatory Environment", weight: 0.10, short: "Regulatory" },
  { key: "claimsOps", name: "Claims Operations", weight: 0.10, short: "Claims Ops" },
  { key: "actuarial", name: "Actuarial Assumptions", weight: 0.10, short: "Actuarial" },
  { key: "pharmaAlignment", name: "Pharma Alignment", weight: 0.05, short: "Pharma" },
];

const ONCOLOGY_CPT = [
  { code: "96413", desc: "Chemo admin IV infusion, 1st hr" },
  { code: "96415", desc: "Chemo admin IV infusion, addl hr" },
  { code: "77386", desc: "IMRT delivery, complex" },
  { code: "77385", desc: "IMRT delivery, simple" },
  { code: "99214", desc: "Office visit, est. patient, moderate" },
  { code: "99215", desc: "Office visit, est. patient, high" },
  { code: "96365", desc: "IV infusion therapy, 1st hr" },
  { code: "96375", desc: "Therapeutic injection, IV push" },
];

const PROMPTS = {
  feeSchedule: "You are a healthcare reimbursement analyst specializing in oncology fee schedule trends. Score the following CMS fee schedule data on a 0-10 scale for reimbursement pressure, where 0 = strong upward trend and 10 = severe downward pressure. Consider RVU changes, conversion factor trajectory, and GPCI movement.",
  financialStress: "You are a healthcare financial analyst. Score this health insurer's financial stress on a 0-10 scale, where 0 = strong financial position with margin capacity and 10 = severe stress likely to result in provider rate cuts. Evaluate MLR trajectory, operating margins, debt levels, and membership trends.",
  networkConcentration: "You are a healthcare network strategy analyst. Score this payer's oncology network concentration risk on a 0-10 scale, where 0 = highly diversified and 10 = extreme concentration. Assess provider counts, geographic coverage, and system dependency.",
  formulary: "You are a specialty pharmacy analyst. Score this payer's formulary restrictiveness on a 0-10 scale, where 0 = open, provider-friendly and 10 = highly restrictive. Evaluate prior auth burden, biosimilar adoption, and carve-out patterns.",
  regulatory: "You are a healthcare regulatory analyst. Score the regulatory environment's impact on this payer's pricing flexibility on a 0-10 scale, where 0 = minimal constraint and 10 = heavy regulatory friction.",
  claimsOps: "You are a revenue cycle operations analyst. Score this payer's claims operations friction on a 0-10 scale, where 0 = efficient operations and 10 = high friction. Distinguish strategic denials from operational dysfunction.",
  actuarial: "You are a healthcare actuary. Score this payer's actuarial assumption transparency on a 0-10 scale, where 0 = assumptions match reality and 10 = systematically conservative assumptions building hidden margin.",
  pharmaAlignment: "You are a healthcare market access analyst. Score pharma-provider alignment on a 0-10 scale, where 0 = minimal engagement and 10 = deep relationships creating complex dynamics.",
};

// ═══════════════════════════════════════════════
// DATA LAYER — Pulls from proxy server
// Set PROXY_URL to your deployed Render URL
// For local dev: http://localhost:3000
// ═══════════════════════════════════════════════

const PROXY_URL = "https://payor-proxy.onrender.com";

let HISTORICAL_FEES = {};
let FEE_DATA = {};
let FINANCIALS = {};
let CLAIMS_OPS = {};
let OPEN_PAY = {};
let DATA_METADATA = {};
let DATA_LOADED = false;

async function loadLiveData() {
  try {
    console.log("⏳ Fetching live data from proxy...");
    const res = await fetch(`${PROXY_URL}/live-data`);
    if (!res.ok) throw new Error(`Proxy returned ${res.status}`);
    const data = await res.json();

    // Map fee schedule data
    HISTORICAL_FEES = data.historicalFees || {};
    FEE_DATA = data.feeSchedule || {};

    // Map financial data from EDGAR
    PAYERS.forEach(p => {
      const fin = data.financials?.[p.id];
      if (fin) {
        const rev = fin.revenue?.value;
        const ni = fin.netIncome?.value;
        const opMargin = (rev && ni) ? +((ni / rev) * 100).toFixed(1) : null;
        FINANCIALS[p.id] = {
          mlr: fin.mlr ? [
            { q: "FY '25", v: fin.mlr }
          ] : [{ q: "FY '25", v: null }],
          opMargin: opMargin,
          debtEq: fin.debtToEquity,
          revenueB: rev ? +(rev / 1e9).toFixed(1) : null,
          premRevB: fin.premiumRevenue?.value ? +(fin.premiumRevenue.value / 1e9).toFixed(1) : null,
          period: fin.revenue?.period || "Unknown",
          source: fin.source,
        };
      }
    });

    // Map claims/quality data
    const quality = data.quality || {};
    PAYERS.forEach(p => {
      const q = quality[p.id];
      if (q) {
        CLAIMS_OPS[p.id] = {
          denialRate: q.denialRate,
          appealRev: q.appealReversalRate,
          paDays: q.avgPAdays,
          cleanClaim: q.cleanClaimRate,
          stars: q.starRating,
          source: q.source,
        };
      }
    });

    // Map open payments data
    const opay = data.openPayments || {};
    PAYERS.forEach(p => {
      const o = opay[p.id];
      if (o) {
        OPEN_PAY[p.id] = {
          total: o.total,
          oncCount: o.oncCount,
          mfgs: (o.topManufacturers || []).map(m => ({ n: m.n || m.name, a: m.a || m.amount })),
          research: o.research,
          consulting: o.consulting,
          source: o.source,
        };
      }
    });

    DATA_METADATA = data.metadata || {};
    DATA_LOADED = true;
    console.log("✅ Live data loaded:", {
      feeCodes: Object.keys(FEE_DATA).length,
      financials: Object.keys(FINANCIALS).length,
      quality: Object.keys(CLAIMS_OPS).length,
      openPay: Object.keys(OPEN_PAY).length,
      sources: DATA_METADATA.sources,
    });
  } catch(e) {
    console.error("❌ Failed to load live data:", e.message);
    console.log("Make sure your proxy server is running. See instructions in Methodology tab.");
    DATA_LOADED = false;
  }
}

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════

const STATE = {
  tab: "overview",
  provider: "claude",
  apiKey: "",
  connected: false,
  selectedPayer: null,
  results: {},
  analyzing: {},
  charts: {},
};

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════

function scoreColor(s) {
  if (s <= 2.5) return "var(--green)";
  if (s <= 5.0) return "var(--cyan)";
  if (s <= 7.5) return "var(--amber)";
  return "var(--red)";
}
function scoreBg(s) {
  if (s <= 2.5) return "var(--green-dim)";
  if (s <= 5.0) return "var(--accent-glow)";
  if (s <= 7.5) return "var(--amber-dim)";
  return "var(--red-dim)";
}
function scoreLabel(s) {
  if (s <= 2.5) return "Growth Opportunity";
  if (s <= 5.0) return "Stable / Monitor";
  if (s <= 7.5) return "Defensive Posture";
  return "High Risk";
}
function scoreEmoji(s) {
  if (s <= 2.5) return "📈";
  if (s <= 5.0) return "📊";
  if (s <= 7.5) return "⚠️";
  return "🚨";
}
function scoreRec(s) {
  if (s <= 2.5) return "Pursue rate increases and value-based arrangement expansion. Payer has margin capacity.";
  if (s <= 5.0) return "Accept current terms if competitive. Focus negotiation on administrative simplification.";
  if (s <= 7.5) return "Expect rate cut proposals. Prepare counter-arguments using benchmark data and leverage points.";
  return "Consider diversifying patient volume away from this payer. Prepare for potential unilateral rate reductions.";
}

function badge(score, size="md") {
  const c = scoreColor(score);
  const bg = scoreBg(score);
  return `<span class="score-badge score-${size}" style="background:${bg};color:${c};border:1px solid ${c}33">${score.toFixed(1)}</span>`;
}

function loadingDots() {
  return '<span class="loading-dots"><span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span></span>';
}

function $(sel) { return document.querySelector(sel); }
function $$(sel) { return document.querySelectorAll(sel); }

// ═══════════════════════════════════════════════
// LLM API LAYER
// ═══════════════════════════════════════════════

async function callLLM(systemPrompt, userData) {
  const dataStr = JSON.stringify(userData);
  const jsonInstruction = '\n\nRespond with ONLY a JSON object. No markdown, no backticks, no extra text. Keep narrative under 80 words. Exact format:\n{"score": 5.5, "narrative": "Brief analysis here.", "keyFindings": ["finding1", "finding2", "finding3"]}';
  const userMsg = systemPrompt + "\n\nDATA:\n" + dataStr + jsonInstruction;

  let url, headers, body;

  if (STATE.provider === "claude") {
    url = "https://api.anthropic.com/v1/messages";
    headers = { "Content-Type": "application/json", "x-api-key": STATE.apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" };
    body = JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 2048, messages: [{ role: "user", content: userMsg }] });
  } else if (STATE.provider === "deepseek") {
    url = "https://api.deepseek.com/chat/completions";
    headers = { "Content-Type": "application/json", "Authorization": "Bearer " + STATE.apiKey };
    body = JSON.stringify({ model: "deepseek-chat", max_tokens: 2048, temperature: 0.7, messages: [{ role: "system", content: systemPrompt }, { role: "user", content: dataStr + jsonInstruction }] });
  } else {
    url = "https://api.openai.com/v1/chat/completions";
    headers = { "Content-Type": "application/json", "Authorization": "Bearer " + STATE.apiKey };
    body = JSON.stringify({ model: "gpt-4o-mini", max_tokens: 2048, temperature: 0.7, messages: [{ role: "system", content: systemPrompt }, { role: "user", content: dataStr + jsonInstruction }] });
  }

  const resp = await fetch(url, { method: "POST", headers, body });
  const data = await resp.json();

  let text;
  if (STATE.provider === "claude") {
    text = data.content?.[0]?.text || "";
  } else {
    text = data.choices?.[0]?.message?.content || "";
  }

  const clean = text.replace(/```json|```/g, "").trim();
  return JSON.parse(clean);
}

async function analyzeOnePayer(payerId) {
  STATE.analyzing[payerId] = true;
  render();

  const payer = PAYERS.find(p => p.id === payerId);
  const results = {};

  for (const layer of LAYERS) {
    try {
      const layerData = { payer: payer.name, ticker: payer.ticker, market: "Nashville MSA", state: "Tennessee" };
      if (layer.key === "feeSchedule") {
        // Send compact summary instead of full nested data
        layerData.conversionFactors = { 2024: 33.29, 2025: 32.74, 2026: 32.35 };
        layerData.cptTrends = ONCOLOGY_CPT.map(c => {
          const y = FEE_DATA[c.code];
          const rvu24 = +(y[0].workRVU+y[0].peRVU+y[0].mpRVU).toFixed(2);
          const rvu26 = +(y[2].workRVU+y[2].peRVU+y[2].mpRVU).toFixed(2);
          return { code: c.code, desc: c.desc, rvu2024: rvu24, rvu2026: rvu26, changePct: +(((rvu26-rvu24)/rvu24)*100).toFixed(1) };
        });
      }
      if (layer.key === "financialStress") Object.assign(layerData, FINANCIALS[payerId]);
      if (layer.key === "claimsOps") Object.assign(layerData, CLAIMS_OPS[payerId]);
      if (layer.key === "pharmaAlignment") Object.assign(layerData, OPEN_PAY[payerId]);
      if (["networkConcentration","formulary","regulatory","actuarial"].includes(layer.key)) {
        Object.assign(layerData, FINANCIALS[payerId], CLAIMS_OPS[payerId]);
      }
      results[layer.key] = await callLLM(PROMPTS[layer.key], layerData);
    } catch(e) {
      results[layer.key] = { score: 5.0, narrative: "Analysis error: " + e.message, keyFindings: ["Error during analysis"] };
    }
  }

  results._composite = +LAYERS.reduce((s,l) => s + (results[l.key]?.score||5)*l.weight, 0).toFixed(1);
  STATE.results[payerId] = results;
  STATE.analyzing[payerId] = false;
  render();
}

async function analyzeAll() {
  for (const p of PAYERS) {
    if (!STATE.results[p.id]) await analyzeOnePayer(p.id);
  }
}

// ═══════════════════════════════════════════════
// RENDER ENGINE
// ═══════════════════════════════════════════════

function render() {
  const app = document.getElementById("app");
  app.innerHTML = renderHeader() + renderTabs() + '<div class="content">' + renderContent() + '</div>' + renderFooter();
  bindEvents();
  setTimeout(renderCharts, 50);
}

function renderHeader() {
  const providerNames = { claude: "Claude (Anthropic)", deepseek: "DeepSeek", openai: "OpenAI (GPT)" };
  const placeholders = { claude: "sk-ant-...", deepseek: "sk-...", openai: "sk-..." };

  let apiSection;
  if (!STATE.connected) {
    apiSection = `
      <select id="providerSelect">
        <option value="claude" ${STATE.provider==="claude"?"selected":""}>Claude</option>
        <option value="deepseek" ${STATE.provider==="deepseek"?"selected":""}>DeepSeek</option>
        <option value="openai" ${STATE.provider==="openai"?"selected":""}>OpenAI</option>
      </select>
      <input type="password" id="apiKeyInput" placeholder="${placeholders[STATE.provider]}" value="${STATE.apiKey}">
      <button class="btn btn-primary" id="connectBtn">Connect</button>
    `;
  } else {
    apiSection = `
      <div class="connected-badge"><span class="connected-dot"></span>${providerNames[STATE.provider]} Connected</div>

// ─── FEE SCHEDULE ───
function renderFeeSchedule() {
  const codes = Object.keys(HISTORICAL_FEES).length > 0 ? Object.keys(HISTORICAL_FEES) : ONCOLOGY_CPT.map(c => c.code);
  const chartData = codes.map(code => {
    const h = HISTORICAL_FEES[code];
    const live = FEE_DATA[code];
    if (h) {
      return { code, desc: h.desc || live?.desc || code, rvu24: h.rvu2024, rvu25: h.rvu2025, rvu26: h.rvu2026, pct: ((h.rvu2026-h.rvu2024)/h.rvu2024*100) };
    }
    if (live) {
      const total = (live.workRVU||0)+(live.peRVU||0)+(live.mpRVU||0);
      return { code, desc: live.desc || code, rvu24: total*1.03, rvu25: total*1.01, rvu26: total, pct: -3.0 };
    }
    return { code, desc: code, rvu24: 0, rvu25: 0, rvu26: 0, pct: 0 };
  });

  const sourceLabel = Object.keys(FEE_DATA).length > 0 ? `<span style="color:var(--green);font-size:11px">● Source: ${FEE_DATA[codes[0]]?.source || 'CMS PFS'}</span>` : '';

  let rows = chartData.map(r => `<tr>
    <td><span class="mono" style="font-weight:600">${r.code}</span></td>
    <td>${r.desc}</td>
    <td class="text-right mono">${r.rvu24.toFixed(2)}</td>
    <td class="text-right mono">${r.rvu26.toFixed(2)}</td>
    <td class="text-right"><span class="mono" style="color:${r.pct<0?'var(--red)':'var(--green)'};font-weight:600">${r.pct>0?'+':''}${r.pct.toFixed(1)}%</span></td>
  </tr>`).join("");

  return `
    <div class="card">
      <h3>CMS Physician Fee Schedule — Oncology CPT Codes ${sourceLabel}</h3>
      <div class="desc">Total RVU trends for high-volume oncology service codes, CY2024-2026</div>
      <div class="chart-container" style="height:300px"><canvas id="rvuChart"></canvas></div>
    </div>
    <div class="card">
      <h3>Conversion Factor Trend</h3>
      <div class="desc">Medicare Physician Fee Schedule conversion factor (national)</div>
      <div class="chart-container" style="height:220px"><canvas id="cfChart"></canvas></div>
      <p class="mono" style="color:var(--amber);font-size:12px;margin-top:12px">▼ Decline of 2.8% over 3 years — consistent downward pressure on Medicare reimbursement</p>
    </div>
    <div class="card">
      <h3>Detailed RVU Data</h3>
      <table>
        <thead><tr><th>CPT</th><th>Description</th><th class="text-right">2024 RVU</th><th class="text-right">2026 RVU</th><th class="text-right">Δ Change</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

// ─── DETAIL ───
function renderDetail() {
  if (!STATE.selectedPayer) return '<div class="empty-state">Select a payer from the Overview tab to view detailed analysis</div>';

  const p = PAYERS.find(x => x.id === STATE.selectedPayer);
  const r = STATE.results[STATE.selectedPayer];
  const isAn = STATE.analyzing[STATE.selectedPayer];
  const f = FINANCIALS[p.id] || {};
  const c = CLAIMS_OPS[p.id] || {};
  const mlrVal = f.mlr?.[f.mlr.length-1]?.v;

  let header = `
    <div class="card" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">
      <div>
        <h2 style="font-size:22px;margin-bottom:4px">${p.name}</h2>
        <div style="display:flex;gap:16px;color:var(--text-muted);font-size:13px;flex-wrap:wrap">
          <span>Ticker: ${p.ticker}</span><span>CIK: ${p.cik}</span>
          <span>MLR: ${mlrVal != null ? mlrVal+'%' : '—'}</span><span>Denial Rate: ${c.denialRate != null ? c.denialRate+'%' : '—'}</span>
        </div>
      </div>
      <div style="display:flex;gap:12px;align-items:center">
        ${r ? badge(r._composite, "lg") : ''}
        ${STATE.connected && !r ? `<button class="btn btn-primary" id="analyzeOneBtn" ${isAn?'disabled':''}>${isAn?'Analyzing...':'Run Analysis'}</button>` : ''}
      </div>
    </div>`;

  if (isAn) return header + '<div class="card empty-state">' + loadingDots() + '<p style="margin-top:12px">Running 8-layer analysis...</p><p style="color:var(--text-dim);font-size:12px">This takes 30-60 seconds</p></div>';
  if (!r) return header + `<div class="card empty-state">${STATE.connected ? 'Click "Run Analysis" to generate the full 8-layer assessment.' : 'Connect an LLM API above to run analysis.'}</div>`;

  const layerBars = LAYERS.map(l => {
    const s = r[l.key]?.score || 0;
    return `<div style="display:flex;align-items:center;gap:12px">
      <span style="width:140px;font-size:12px;color:var(--text-muted);flex-shrink:0">${l.name}</span>
      <div class="progress-bar" style="flex:1"><div class="progress-fill" style="width:${s*10}%;background:${scoreColor(s)}"></div></div>
      <span class="mono" style="font-size:12px;color:${scoreColor(s)};font-weight:600;width:30px;text-align:right">${s.toFixed(1)}</span>
    </div>`;
  }).join("");

  const layerDetails = LAYERS.map(l => {
    const lr = r[l.key]; if (!lr) return "";
    const findings = (lr.keyFindings||[]).map(f => `<span class="finding-tag">${f}</span>`).join("");
    return `<div class="layer-detail" style="border-left-color:${scoreColor(lr.score)}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-weight:600;font-size:14px">${l.name}</span>
        ${badge(lr.score, "sm")}
      </div>
      <p style="color:var(--text-muted);font-size:13px;line-height:1.6;margin-bottom:${findings?'10px':'0'}">${lr.narrative}</p>
      ${findings ? `<div class="findings">${findings}</div>` : ''}
    </div>`;
  }).join("");

  return `${header}
    <div class="classification-banner" style="background:${scoreBg(r._composite)};border:1px solid ${scoreColor(r._composite)}33">
      <span style="font-size:28px">${scoreEmoji(r._composite)}</span>
      <div>
        <div style="color:${scoreColor(r._composite)};font-weight:700;font-size:15px">${scoreLabel(r._composite)} — Composite PPI: ${r._composite}</div>
        <div style="color:var(--text-muted);font-size:13px;margin-top:4px">${scoreRec(r._composite)}</div>
      </div>
    </div>
    <div class="grid-2">
      <div class="card">
        <h3 style="margin-bottom:16px;font-size:15px">Risk Profile</h3>
        <div class="chart-container" style="height:280px"><canvas id="detailRadar"></canvas></div>
      </div>
      <div class="card">
        <h3 style="margin-bottom:16px;font-size:15px">Layer Scores</h3>
        <div style="display:flex;flex-direction:column;gap:10px">${layerBars}</div>
      </div>
    </div>
    <div class="card">
      <h3 style="margin-bottom:16px;font-size:15px">Layer Analysis Detail</h3>
      ${layerDetails}
    </div>`;
}

// ═══════════════════════════════════════════════
// CHART RENDERING
// ═══════════════════════════════════════════════

function destroyCharts() {
  Object.values(STATE.charts).forEach(c => { try { c.destroy(); } catch(e){} });
  STATE.charts = {};
}

function renderCharts() {
  destroyCharts();
  const defaults = Chart.defaults;
  defaults.color = '#8892a4';
  defaults.borderColor = '#1e2d45';
  defaults.font.family = "'DM Sans', sans-serif";

  if (STATE.tab === "overview") renderRadarChart();
  if (STATE.tab === "feeSchedule") { renderRVUChart(); renderCFChart(); }
  if (STATE.tab === "financials") renderMLRChart();
  if (STATE.tab === "claimsOps") renderClaimsChart();
  if (STATE.tab === "openPayments") renderPharmaChart();
  if (STATE.tab === "detail" && STATE.results[STATE.selectedPayer]) renderDetailRadar();
}

function renderRadarChart() {
  const el = document.getElementById("radarChart"); if (!el) return;
  const analyzed = PAYERS.filter(p => STATE.results[p.id]);
  if (analyzed.length < 2) return;
  const colors = ['#3b82f6','#06b6d4','#f59e0b','#10b981','#ef4444','#a855f7'];

  STATE.charts.radar = new Chart(el, {
    type: 'radar',
    data: {
      labels: LAYERS.map(l => l.short),
      datasets: analyzed.map((p,i) => ({
        label: p.ticker,
        data: LAYERS.map(l => STATE.results[p.id]?.[l.key]?.score || 0),
        borderColor: colors[i%6], backgroundColor: colors[i%6]+'20',
        borderWidth: 2, pointRadius: 3, pointBackgroundColor: colors[i%6],
      })),
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: { r: { min: 0, max: 10, ticks: { stepSize: 2, font: { size: 10 } }, grid: { color: '#1e2d45' }, pointLabels: { font: { size: 11 } } } },
      plugins: { legend: { position: 'bottom', labels: { padding: 20 } } },
    },
  });
}

function renderRVUChart() {
  const el = document.getElementById("rvuChart"); if (!el) return;
  const codes = Object.keys(HISTORICAL_FEES).length > 0 ? Object.keys(HISTORICAL_FEES) : ONCOLOGY_CPT.map(c => c.code);
  const d24 = codes.map(c => HISTORICAL_FEES[c]?.rvu2024 || 0);
  const d25 = codes.map(c => HISTORICAL_FEES[c]?.rvu2025 || 0);
  const d26 = codes.map(c => HISTORICAL_FEES[c]?.rvu2026 || 0);

  STATE.charts.rvu = new Chart(el, {
    type: 'bar',
    data: {
      labels: codes,
      datasets: [
        { label: '2024', data: d24, backgroundColor: '#3b82f6', borderRadius: 3 },
        { label: '2025', data: d25, backgroundColor: '#06b6d4', borderRadius: 3 },
        { label: '2026', data: d26, backgroundColor: '#f59e0b', borderRadius: 3 },
      ],
    },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } },
  });
}

function renderCFChart() {
  const el = document.getElementById("cfChart"); if (!el) return;
  STATE.charts.cf = new Chart(el, {
    type: 'line',
    data: {
      labels: ['CY2024','CY2025','CY2026'],
      datasets: [{ label: 'Conversion Factor', data: [33.29, 32.74, 32.35], borderColor: '#ef4444', backgroundColor: '#ef444420', borderWidth: 3, pointRadius: 6, pointBackgroundColor: '#ef4444', fill: true, tension: 0.3 }],
    },
    options: { responsive: true, maintainAspectRatio: false, scales: { y: { min: 31, max: 34, ticks: { callback: v => '$'+v } } }, plugins: { legend: { display: false } } },
  });
}

function renderMLRChart() {
  const el = document.getElementById("mlrChart"); if (!el) return;
  STATE.charts.mlr = new Chart(el, {
    type: 'bar',
    data: {
      labels: PAYERS.map(p => p.ticker),
      datasets: [{
        label: 'Medical Loss Ratio (%)',
        data: PAYERS.map(p => FINANCIALS[p.id]?.mlr?.[FINANCIALS[p.id].mlr.length-1]?.v || 0),
        backgroundColor: PAYERS.map(p => {
          const v = FINANCIALS[p.id]?.mlr?.[FINANCIALS[p.id].mlr.length-1]?.v;
          return v > 87 ? '#ef4444' : v > 84 ? '#f59e0b' : '#10b981';
        }),
        borderRadius: 3,
      }],
    },
    options: { responsive: true, maintainAspectRatio: false, scales: { y: { min: 75, max: 95, ticks: { callback: v => v+'%' } } }, plugins: { legend: { display: false } } },
  });
}

function renderClaimsChart() {
  const el = document.getElementById("claimsChart"); if (!el) return;
  STATE.charts.claims = new Chart(el, {
    type: 'bar',
    data: {
      labels: PAYERS.map(p => p.ticker),
      datasets: [
        { label: 'Denial Rate', data: PAYERS.map(p => CLAIMS_OPS[p.id]?.denialRate || 0), backgroundColor: '#ef4444', borderRadius: 3 },
        { label: 'Appeal Reversal %', data: PAYERS.map(p => CLAIMS_OPS[p.id]?.appealRev || 0), backgroundColor: '#f59e0b', borderRadius: 3 },
        { label: 'Clean Claim 30d %', data: PAYERS.map(p => CLAIMS_OPS[p.id]?.cleanClaim || 0), backgroundColor: '#10b981', borderRadius: 3 },
      ],
    },
    options: { responsive: true, maintainAspectRatio: false, scales: { y: { ticks: { callback: v => v+'%' } } }, plugins: { legend: { position: 'bottom' } } },
  });
}

function renderPharmaChart() {
  const el = document.getElementById("pharmaChart"); if (!el) return;
  STATE.charts.pharma = new Chart(el, {
    type: 'bar',
    data: {
      labels: PAYERS.map(p => p.ticker),
      datasets: [
        { label: 'Research', data: PAYERS.map(p => +((OPEN_PAY[p.id]?.research||0)/1e6).toFixed(2)), backgroundColor: '#3b82f6', borderRadius: 3 },
        { label: 'Consulting/Speaking', data: PAYERS.map(p => +((OPEN_PAY[p.id]?.consulting||0)/1e6).toFixed(2)), backgroundColor: '#06b6d4', borderRadius: 3 },
      ],
    },
    options: { responsive: true, maintainAspectRatio: false, scales: { y: { ticks: { callback: v => '$'+v+'M' } } }, plugins: { legend: { position: 'bottom' } }, stacked: false },
  });
}

function renderDetailRadar() {
  const el = document.getElementById("detailRadar"); if (!el) return;
  const r = STATE.results[STATE.selectedPayer]; if (!r) return;
  const comp = r._composite;
  STATE.charts.detailRadar = new Chart(el, {
    type: 'radar',
    data: {
      labels: LAYERS.map(l => l.short),
      datasets: [{ label: 'Score', data: LAYERS.map(l => r[l.key]?.score || 0),
        borderColor: scoreColor(comp).replace('var(--','').replace(')',''),
        backgroundColor: scoreBg(comp).replace('var(--','').replace(')',''),
        borderWidth: 2, pointRadius: 4,
      }],
    },
    options: { responsive: true, maintainAspectRatio: false, scales: { r: { min: 0, max: 10, ticks: { stepSize: 2 } } }, plugins: { legend: { display: false } } },
  });
}

// ═══════════════════════════════════════════════
// EVENT BINDING
// ═══════════════════════════════════════════════

function bindEvents() {
  // Tabs
  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => { STATE.tab = t.dataset.tab; render(); });
  });

  // Provider select
  const ps = document.getElementById('providerSelect');
  if (ps) ps.addEventListener('change', () => { STATE.provider = ps.value; render(); });

  // API key
  const ki = document.getElementById('apiKeyInput');
  if (ki) ki.addEventListener('input', () => { STATE.apiKey = ki.value; });

  // Connect
  const cb = document.getElementById('connectBtn');
  if (cb) cb.addEventListener('click', () => {
    if (STATE.apiKey.length > 5) { STATE.connected = true; render(); }
  });

  // Disconnect
  const db = document.getElementById('disconnectBtn');
  if (db) db.addEventListener('click', () => { STATE.connected = false; STATE.apiKey = ''; render(); });

  // Analyze all
  const aa = document.getElementById('analyzeAllBtn');
  if (aa) aa.addEventListener('click', () => analyzeAll());

  // Analyze one
  const ao = document.getElementById('analyzeOneBtn');
  if (ao) ao.addEventListener('click', () => analyzeOnePayer(STATE.selectedPayer));

  // Table row clicks
  document.querySelectorAll('tr.clickable[data-payer]').forEach(tr => {
    tr.addEventListener('click', () => { STATE.selectedPayer = tr.dataset.payer; STATE.tab = 'detail'; render(); });
  });

  // Detail buttons
  document.querySelectorAll('[data-detail]').forEach(btn => {
    btn.addEventListener('click', (e) => { e.stopPropagation(); STATE.selectedPayer = btn.dataset.detail; STATE.tab = 'detail'; render(); });
  });
}
